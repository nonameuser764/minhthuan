<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8" />
    <title>Heart + Universe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 0, 140, 0.25) 0%, transparent 50%), 
                radial-gradient(circle at 80% 20%, rgba(0, 128, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 25%, #1a0026 0%, #000010 45%, #000 100%);
        }
        
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            will-change: transform;
            image-rendering: auto;
        }
        
        #universe {
            z-index: 1;
        }
        
        #pinkboard {
            z-index: 5;
        }
        
        #textLove {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #3490da;
            /* clamp: tối thiểu 22px, ưu tiên 5.5vw, tối đa 38px
               → tự co lại khi màn hình nhỏ / xoay ngang, không bao giờ xuống dòng */
            font-size: clamp(32px, 7.5vw, 52px);
            font-weight: bold;
            font-family: Arial, sans-serif;
            text-shadow: 0 0 10px #ff4da6, 0 0 20px #ff99cc;
            animation: pulse 1.5s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 6;
            will-change: transform, opacity;
            /* Đảm bảo chữ luôn 1 dòng dù màn hình ngang hay dọc */
            white-space: nowrap;
        }
        
        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: .8;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }
        
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(100, 255, 255, 0.06);
            border: 1px solid rgba(100, 255, 255, 0.4);
            box-shadow: 0 0 8px rgba(100, 255, 255, 0.2) inset;
            pointer-events: none;
            z-index: 3;
            will-change: transform, opacity;
        }
    </style>
</head>

<body>

    <canvas id="universe"></canvas>
    <canvas id="pinkboard"></canvas>
    <div id="textLove">Minh Thuận</div>

    <script>
        var settings = {
            particles: {
                length: 400,
                duration: 2,
                velocity: 90,
                effect: -.75,
                size: 26
            }
        };
        (function() {
            var b = 0;
            var c = ["ms", "moz", "webkit", "o"];
            for (var a = 0; a < c.length && !window.requestAnimationFrame; ++a) {
                window.requestAnimationFrame = window[c[a] + "RequestAnimationFrame"];
                window.cancelAnimationFrame = window[c[a] + "CancelAnimationFrame"] || window[c[a] + "CancelRequestAnimationFrame"]
            }
            if (!window.requestAnimationFrame) {
                window.requestAnimationFrame = function(h, e) {
                    var d = new Date().getTime();
                    var f = Math.max(0, 16 - (d - b));
                    var g = window.setTimeout(function() {
                        h(d + f)
                    }, f);
                    b = d + f;
                    return g
                }
            }
            if (!window.cancelAnimationFrame) {
                window.cancelAnimationFrame = function(d) {
                    clearTimeout(d)
                }
            }
        })();
        var Point = function(x, y) {
            this.x = x || 0;
            this.y = y || 0
        };
        Point.prototype.clone = function() {
            return new Point(this.x, this.y)
        };
        Point.prototype.length = function(l) {
            if (l === undefined) return Math.sqrt(this.x * this.x + this.y * this.y);
            this.normalize();
            this.x *= l;
            this.y *= l;
            return this
        };
        Point.prototype.normalize = function() {
            var l = this.length();
            this.x /= l;
            this.y /= l;
            return this
        };
        var Particle = function() {
            this.position = new Point();
            this.velocity = new Point();
            this.acceleration = new Point();
            this.age = 0
        };
        Particle.prototype.initialize = function(x, y, dx, dy) {
            this.position.x = x;
            this.position.y = y;
            this.velocity.x = dx;
            this.velocity.y = dy;
            this.acceleration.x = dx * settings.particles.effect;
            this.acceleration.y = dy * settings.particles.effect;
            this.age = 0
        };
        Particle.prototype.update = function(dt) {
            this.position.x += this.velocity.x * dt;
            this.position.y += this.velocity.y * dt;
            this.velocity.x += this.acceleration.x * dt;
            this.velocity.y += this.acceleration.y * dt;
            this.age += dt
        };
        Particle.prototype.draw = function(c, img) {
            var t = this.age / settings.particles.duration;
            var s = img.width * ((--t) * t * t + 1);
            c.globalAlpha = 1 - this.age / settings.particles.duration;
            c.drawImage(img, this.position.x - s / 2, this.position.y - s / 2, s, s)
        };
        var ParticlePool = function(l) {
            var a = new Array(l);
            for (var i = 0; i < l; i++) a[i] = new Particle();
            var g = 0,
                d = 0,
                f = settings.particles.duration;
            this.add = function(x, y, dx, dy) {
                a[d].initialize(x, y, dx, dy);
                d++;
                if (d == l) d = 0;
                if (g == d) g++;
                if (g == l) g = 0
            };
            this.update = function(dt) {
                var i;
                if (g < d) {
                    for (i = g; i < d; i++) a[i].update(dt)
                }
                if (d < g) {
                    for (i = g; i < l; i++) a[i].update(dt);
                    for (i = 0; i < d; i++) a[i].update(dt)
                }
                while (a[g].age >= f && g != d) {
                    g++;
                    if (g == l) g = 0
                }
            };
            this.draw = function(c, img) {
                var i;
                if (g < d) {
                    for (i = g; i < d; i++) a[i].draw(c, img)
                }
                if (d < g) {
                    for (i = g; i < l; i++) a[i].draw(c, img);
                    for (i = 0; i < d; i++) a[i].draw(c, img)
                }
            }
        };
        (function(canvas) {
            var ctx = canvas.getContext("2d"),
                pool = new ParticlePool(settings.particles.length),
                rate = settings.particles.length / settings.particles.duration,
                time;

            function heart(t) {
                return new Point(160 * Math.sin(t) ** 3, 130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25)
            }
            var img = (function() {
                var c = document.createElement("canvas"),
                    x = c.getContext("2d");
                c.width = settings.particles.size;
                c.height = settings.particles.size;

                function to(t) {
                    var p = heart(t);
                    p.x = c.width / 2 + p.x * c.width / 350;
                    p.y = c.height / 2 - p.y * c.height / 350;
                    return p
                }
                x.beginPath();
                var t = -Math.PI,
                    p = to(t);
                x.moveTo(p.x, p.y);
                while (t < Math.PI) {
                    t += .01;
                    p = to(t);
                    x.lineTo(p.x, p.y)
                }
                x.closePath();
                x.fillStyle = "#ea80b0";
                x.fill();
                var i = new Image();
                i.src = c.toDataURL();
                return i
            })();

            function render() {
                requestAnimationFrame(render);
                var newTime = new Date().getTime() / 1000,
                    dt = newTime - (time || newTime);
                time = newTime;
                if (canvas.width !== canvas.clientWidth) {
                    canvas.width = canvas.clientWidth;
                }
                if (canvas.height !== canvas.clientHeight) {
                    canvas.height = canvas.clientHeight;
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                var amount = rate * dt;
                for (var i = 0; i < amount; i++) {
                    var pos = heart(Math.PI - 2 * Math.PI * Math.random());
                    var dir = pos.clone().length(settings.particles.velocity);
                    pool.add(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y)
                }
                pool.update(dt);
                pool.draw(ctx, img)
            }

            function resize() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight
            }
            window.addEventListener("resize", resize);
            setTimeout(function() {
                resize();
                render()
            }, 10)
        })(document.getElementById("pinkboard"));
    </script>

    <script>
        const uv = document.getElementById("universe"),
              ctx = uv.getContext("2d");

        // Helper: trả về số nhỏ nhất của width/height màn hình hiện tại
        function isMobile() { return Math.min(window.innerWidth, window.innerHeight) < 600; }

        function resizeUV() {
            uv.width = window.innerWidth;
            uv.height = window.innerHeight;
        }
        resizeUV();

        // --- 1. Pháo hoa (Fireworks) ---
        let particlesFw = [];
        function createFirework(x, y) {
            let color = "hsl(" + Math.random() * 360 + ",100%,65%)";
            let maxCount = isMobile() ? 30 : 50;
            for (let i = 0; i < maxCount; i++) {
                let a = Math.random() * 2 * Math.PI,
                    s = Math.random() * 3.5 + 2.5;
                particlesFw.push({
                    x, y,
                    vx: Math.cos(a) * s,
                    vy: Math.sin(a) * s,
                    alpha: 1,
                    size: Math.random() * 3 + 2,
                    color
                });
            }
        }
        setInterval(() => {
            // Tọa độ pháo hoa tính theo window.innerWidth/Height lúc bắn (tự cập nhật sau xoay)
            createFirework(window.innerWidth * 0.15, window.innerHeight - 180);
            createFirework(window.innerWidth * 0.85, window.innerHeight - 180);
        }, 1100);

        // --- 2. Tuyết rơi (Snow) ---
        let arrSnow = [];
        function getMaxSnow() { return isMobile() ? 40 : 80; }
        function addSnow() {
            if (arrSnow.length < getMaxSnow()) {
                arrSnow.push({
                    x: Math.random() * uv.width,
                    y: -10,
                    s: Math.random() * 1.2 + 0.8,
                    c: ["❄", "✻", "✼", "✥"][Math.floor(Math.random() * 4)],
                    z: Math.random() * 12 + 10
                });
            }
        }
        setInterval(addSnow, 120);

        // --- 3. Sao lấp lánh (Twinkle Stars) ---
        let starsTw = [];
        function buildTwinkleStars() {
            const count = isMobile() ? 60 : 120;
            starsTw = [];
            for (let i = 0; i < count; i++) {
                starsTw.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight * 0.75,
                    r: Math.random() * 1.3 + 0.3,
                    a: Math.random() * 1,
                    s: Math.random() * 0.02 + 0.005
                });
            }
        }
        buildTwinkleStars();

        // --- 4. Sao băng (Shooting Stars) ---
        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * uv.width;
                this.y = Math.random() * uv.height * 0.4;
                this.len = Math.random() * 90 + 40;
                this.sp = Math.random() * 7 + 6;
                this.a = Math.random() * (Math.PI * 0.25) + (Math.PI * 0.1);
                this.w = Math.random() * 2.5 + 1;
                this.color = `hsl(${Math.random()*360}, 100%, 75%)`;
            }
            update() {
                this.x += Math.cos(this.a) * this.sp;
                this.y += Math.sin(this.a) * this.sp;
                if (this.x > uv.width || this.y > uv.height || this.x < 0 || this.y < 0) this.reset();
            }
            draw() {
                const ex = this.x - Math.cos(this.a) * this.len;
                const ey = this.y - Math.sin(this.a) * this.len;
                const g = ctx.createLinearGradient(this.x, this.y, ex, ey);
                g.addColorStop(0, this.color);
                g.addColorStop(1, "rgba(255,255,255,0)");
                ctx.beginPath();
                ctx.strokeStyle = g;
                ctx.lineWidth = this.w;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(ex, ey);
                ctx.stroke();
            }
        }
        let stars = [];
        function buildShootingStars() {
            const count = isMobile() ? 6 : 12;
            stars = [];
            for (let i = 0; i < count; i++) stars.push(new Star());
        }
        buildShootingStars();

        // --- Xử lý resize / xoay màn hình ---
        // Dùng debounce nhỏ để tránh gọi liên tục trong khi xoay
        let resizeTimer;
        function handleResize() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                resizeUV();
                // Tái tạo các mảng phụ thuộc kích thước màn hình
                buildTwinkleStars();
                buildShootingStars();
                // Xóa tuyết cũ nằm ngoài vùng mới
                arrSnow = arrSnow.filter(s => s.x < uv.width && s.y < uv.height);
            }, 100);
        }
        window.addEventListener('resize', handleResize);
        // orientationchange đảm bảo bắt kịp cả khi trình duyệt không fire resize đúng lúc
        window.addEventListener('orientationchange', () => {
            // Chờ trình duyệt hoàn tất xoay rồi mới đo lại
            setTimeout(handleResize, 200);
        });

        // 🔄 VÒNG LẶP CHÍNH
        function loopUniverse() {
            ctx.clearRect(0, 0, uv.width, uv.height);

            // 1. Sao lấp lánh
            starsTw.forEach(s => {
                s.a += s.s;
                const o = 0.3 + Math.abs(Math.sin(s.a)) * 0.6;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, 2 * Math.PI);
                ctx.fillStyle = `rgba(255,255,255,${o})`;
                ctx.fill();
            });

            // 2. Sao băng
            stars.forEach(s => {
                s.update();
                s.draw();
            });

            // 3. Tuyết rơi
            ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
            let activeSnow = [];
            for (let i = 0; i < arrSnow.length; i++) {
                let s = arrSnow[i];
                ctx.font = s.z + "px Arial";
                s.y += s.s;
                ctx.fillText(s.c, s.x, s.y);
                if (s.y < uv.height + 20) activeSnow.push(s);
            }
            arrSnow = activeSnow;

            // 4. Pháo hoa
            let activeFw = [];
            for (let i = 0; i < particlesFw.length; i++) {
                let p = particlesFw[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += .02;
                p.alpha -= .016;
                if (p.alpha > 0) {
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, 2 * Math.PI);
                    ctx.fill();
                    activeFw.push(p);
                }
            }
            ctx.globalAlpha = 1.0;
            particlesFw = activeFw;

            requestAnimationFrame(loopUniverse);
        }
        loopUniverse();
    </script>

    <script>
        let currentBubbles = 0;
        function getMaxBubbles() { return Math.min(window.innerWidth, window.innerHeight) < 600 ? 12 : 22; }

        function bubble() {
            if (currentBubbles >= getMaxBubbles()) return;

            const b = document.createElement("div");
            b.className = "bubble";
            const size = 8 + Math.random() * 24;
            b.style.width = size + "px";
            b.style.height = size + "px";
            // Dùng window.innerWidth tại thời điểm tạo bong bóng → luôn đúng sau xoay
            b.style.left = Math.random() * (window.innerWidth - size) + "px";
            b.style.bottom = "-30px";
            
            const up = 180 + Math.random() * 400,
                  side = (Math.random() * 100) - 50;
                  
            currentBubbles++;

            b.animate([
                { transform: "translate(0,0)", opacity: .85 }, 
                { transform: `translate(${side}px,-${up}px)`, opacity: 0 }
            ], {
                duration: 3000 + Math.random() * 2000,
                easing: "ease-out"
            });
            
            document.body.appendChild(b);
            
            setTimeout(() => {
                b.remove();
                currentBubbles--;
            }, 5000);
        }
        setInterval(bubble, 450);
    </script>
</body>

</html>
